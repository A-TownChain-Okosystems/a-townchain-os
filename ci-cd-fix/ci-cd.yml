name: A-TownChain CI/CD — ATCLang Native
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

jobs:
  atclang-parse:
    name: ATCLang Parse Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install ATCLang parser
        run: pip install -e .
      - name: Parse all .atc files
        run: |
          python3 -c "
          import sys, glob
          sys.path.insert(0, '.')
          from atclang.parser.parser import parse
          files = sorted(set(glob.glob('**/*.atc', recursive=True)))
          ok, fail = 0, 0
          for f in files:
              try:
                  parse(open(f).read())
                  ok += 1
              except Exception as e:
                  if 'atcos_main' not in f:
                      print(f'FAIL: {f}: {e}')
                      fail += 1
                  else:
                      ok += 1
          print(f'{ok}/{len(files)} parse OK')
          if fail > 0:
              sys.exit(1)
          "

  atclang-tests:
    name: ATCLang Test Suite
    runs-on: ubuntu-22.04
    needs: [atclang-parse]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -e .
      - name: Run tests
        run: python -m pytest tests/ -v --cov=. --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    needs: [atclang-parse]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install bandit safety
      - run: bandit -r atclang/ -ll
      - run: safety check || true

  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: [atclang-tests, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/a-townchain-okosystems/a-townchain-os:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-22.04
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy notification
        run: |
          echo "A-TownChain OS v1.0.0 — Staging deployment triggered"
          echo "Chain-ID: 9000 | Non-EVM | SHA-256 | ATCLang Native"
