# Prometheus config for A-TownChain OS testnet
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: atc-node0
    static_configs:
      - targets: ["node0:9100"]

  - job_name: atc-node1
    static_configs:
      - targets: ["node1:9101"]

  - job_name: atc-node2
    static_configs:
      - targets: ["node2:9102"]

  - job_name: atc-metrics
    static_configs:
      - targets: ["host.docker.internal:9100"]
