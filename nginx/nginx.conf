# A-TownChain — Nginx Enterprise Config
worker_processes auto;
events { worker_connections 4096; use epoll; }
http {
    server_tokens off;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=wallet:10m rate=20r/m;
    upstream atc_gateway {
        least_conn;
        server validator-1:4000 weight=5 max_fails=3 fail_timeout=30s;
        server validator-2:4000 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl http2;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://atc_gateway;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/mobile/wallet/ { limit_req zone=wallet burst=5; proxy_pass http://atc_gateway; }
        location /health { proxy_pass http://atc_gateway; access_log off; }
        location /metrics { deny all; }
    }
}
