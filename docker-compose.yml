version: "3.9"
x-node-base: &base
  build: {context: ., dockerfile: Dockerfile}
  restart: unless-stopped
  environment: {ATC_CHAIN_ID: "9000", ATC_ENV: testnet}
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
    interval: 30s
    timeout: 10s
    retries: 3
  networks: [atc-net]
  logging:
    driver: json-file
    options: {max-size: 50m, max-file: "5"}
services:
  bootstrap:
    <<: *base
    container_name: atc-bootstrap
    ports: ["5005:5005","9944:9944"]
    volumes: [bootstrap-data:/app/data]
  validator-1:
    <<: *base
    container_name: atc-validator-1
    ports: ["4000:4000","4001:4001"]
    volumes: [val1-data:/app/data]
    depends_on: {bootstrap: {condition: service_healthy}}
  validator-2:
    <<: *base
    container_name: atc-validator-2
    ports: ["4011:4001"]
    volumes: [val2-data:/app/data]
    depends_on: {bootstrap: {condition: service_healthy}}
  fullnode:
    <<: *base
    container_name: atc-fullnode
    volumes: [full-data:/app/data]
    depends_on: {validator-1: {condition: service_healthy}}
  archive:
    <<: *base
    container_name: atc-archive
    volumes: [archive-data:/app/data]
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: atc-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports: ["9090:9090"]
    networks: [atc-net]
  grafana:
    image: grafana/grafana:10.2.0
    container_name: atc-grafana
    volumes: [grafana-data:/var/lib/grafana]
    environment: {GF_SECURITY_ADMIN_PASSWORD: "atcadmin2026!"}
    ports: ["3001:3000"]
    networks: [atc-net]
    depends_on: [prometheus]
  redis:
    image: redis:7-alpine
    container_name: atc-redis
    command: redis-server --maxmemory 256mb
    ports: ["6379:6379"]
    networks: [atc-net]
  nginx:
    image: nginx:1.25-alpine
    container_name: atc-nginx
    volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
    ports: ["80:80","443:443"]
    depends_on: [validator-1, validator-2]
    networks: [atc-net]
networks:
  atc-net:
    driver: bridge
    ipam:
      config: [{subnet: "172.20.0.0/16"}]
volumes:
  bootstrap-data: val1-data: val2-data:
  full-data: archive-data: prom-data:
  grafana-data:
